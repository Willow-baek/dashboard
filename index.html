<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>우리 집 대시보드</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    #bg-wrap{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;transition:background 3s ease;}
    #bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
    #lightning{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;background:rgba(200,220,255,0);transition:background 0.05s;}
    #sun{position:absolute;width:88px;height:88px;border-radius:50%;background:radial-gradient(circle at 38% 38%,#fff9d0,#ffd700 55%,#ff9900);box-shadow:0 0 30px #ffd700,0 0 70px rgba(255,180,0,0.55);top:55px;right:130px;display:none;animation:sunPulse 4s ease-in-out infinite;overflow:visible;}
    #sun-rays{position:absolute;top:0;left:0;width:88px;height:88px;animation:raysRotate 22s linear infinite;}
    .ray{position:absolute;width:2px;border-radius:2px;background:linear-gradient(to bottom,rgba(255,220,80,0.85),transparent);transform-origin:50% 100%;}
    @keyframes sunPulse{0%,100%{box-shadow:0 0 30px #ffd700,0 0 70px rgba(255,180,0,0.55);}50%{box-shadow:0 0 50px #ffd700,0 0 110px rgba(255,180,0,0.65);}}
    @keyframes raysRotate{to{transform:rotate(360deg);}}
    #moon{position:absolute;width:62px;height:62px;border-radius:50%;background:#e8e2cc;box-shadow:0 0 18px rgba(220,210,175,0.55),inset -14px -4px 0 rgba(0,0,0,0.22);top:58px;right:125px;display:none;}
    .cloud{position:absolute;border-radius:60px;animation:cloudDrift linear infinite;}
    @keyframes cloudDrift{from{transform:translateX(-160%)}to{transform:translateX(calc(100vw + 160%))}}
    #dash{position:relative;z-index:2;width:100%;height:100vh;height:-webkit-fill-available;padding:0.4rem;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;display:flex;flex-direction:column;gap:0.35rem;overflow:hidden;transition:color 2.5s ease;}
    .card{border-radius:16px;padding:0.6rem 1rem;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);transition:background 2.5s ease;}
    .section-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;opacity:.38;margin-bottom:4px;}

    /* 1행: 날짜+시간 */
    #header-card{   display:flex;   justify-content:center;   align-items:center;   flex-shrink:0;   position:relative;   min-height:90px; }
    #header-center{display:flex;align-items:baseline;}
    #date-display{font-size:42px;font-weight:600;line-height:1;letter-spacing:-.5px;}
    #time-display{font-size:42px;font-weight:600;line-height:1;letter-spacing:-.5px;margin-left:1.4rem;transition:color 2.5s ease;}
    #greeting{font-size:13px;opacity:.4;margin-left:1rem;}
    #theme-icon{position:absolute;right:.5rem;font-size:26px;}

    /* 1행: 위클리 캘린더 */
    #weekly-card{flex-shrink:0;padding:.3rem 0.8rem;}
    #weekly-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .week-day{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;border-radius:10px;transition:background .3s;}
    .week-day-name{font-size:11px;font-weight:500;opacity:.48;text-transform:uppercase;}
    .week-date{font-size:15px;font-weight:500;opacity:.65;}
    .week-dot{width:5px;height:5px;border-radius:50%;margin-top:1px;opacity:0;}
    .week-day.today{background:rgba(255,255,255,0.24);border-radius:12px;}
    .week-day.today .week-day-name{opacity:.88;font-weight:700;}
    .week-day.today .week-date{font-size:20px;font-weight:700;opacity:1;}
    .week-day.has-event .week-dot{opacity:.75;}

    /* 3행: 다가오는 일정 */
    #events-card{flex:0 0 auto;max-height:190px;overflow:hidden;}
    .event-item{display:flex;align-items:center;gap:16px;padding:4px 0;border-bottom:1px solid rgba(128,128,128,.12);}
    .event-item:last-child{border-bottom:none;}
    .event-dday{font-size:14px;font-weight:700;min-width:56px;text-align:center;padding:5px 8px;border-radius:8px;flex-shrink:0;}
    .dday-today{background:rgba(200,0,0,.16);color:#c00;}
    .dday-soon{background:rgba(200,0,0,.12);color:#c00;}
    .dday-later{background:rgba(128,128,128,.15);}
    .event-when{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .event-date-txt{font-size:18px;font-weight:500;opacity:.9;white-space:nowrap;}
    .event-sep{font-size:14px;opacity:.3;}
    .event-time-txt{font-size:18px;opacity:.65;white-space:nowrap;}
    .event-title{font-size:21px;font-weight:500;flex:1;padding-left:12px;}
    .event-badge{font-size:12px;padding:3px 9px;border-radius:6px;opacity:.7;white-space:nowrap;flex-shrink:0;}

    /* 4행: 한마디 */
    #quote-card{flex:.5;padding:.3rem 0.7rem;display:flex;flex-direction:column;justify-content:center;}
    .quote-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
    .quote-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;opacity:.38;}
    #sync-status{font-size:10px;opacity:.28;}
    .quote-body{display:flex;justify-content:center;align-items:center;text-align:center;flex:1;}
    .quote-text{font-size:22px;line-height:1.4;opacity:.95;font-weight:500;}
    .quote-author{font-size:13px;opacity:.38;margin-top:4px;text-align:center;}

    /* 5행: 날씨/멘트/시설 */
    #bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem;}
    #weather-card{display:flex;flex-direction:column;justify-content:flex-start;align-items:center;text-align:center;padding:.5rem .8rem;}
    .weather-top{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .weather-temp{font-size:48px;font-weight:500;line-height:1;}
    .weather-meta{display:flex;flex-direction:column;gap:1px;align-items:center;}
    .weather-meta span{font-size:14px;opacity:.6;}
    #comment-card{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;text-align:center;padding:.5rem .8rem;}
    .wcl{font-size:15px;font-weight:500;opacity:.9;background:rgba(128,128,128,.14);padding:4px 12px;border-radius:22px;display:inline-block;}
    #facility-card{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:.5rem .8rem;}
    .fac-row{display:flex;justify-content:center;align-items:center;padding:3px 0;border-bottom:1px solid rgba(128,128,128,.1);gap:14px;width:100%;}
    .fac-row:last-child{border-bottom:none;}
    .fac-name{font-size:15px;white-space:nowrap;}
    .fac-time{font-size:15px;font-weight:500;opacity:.75;white-space:nowrap;}
    .closed{opacity:.32;text-decoration:line-through;}

    /* 알림 팝업 */
    #alert-popup{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(15,22,38,0.94);color:#fff;border-radius:22px;padding:18px 22px;min-width:300px;max-width:520px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 8px 32px rgba(0,0,0,0.45);cursor:pointer;border:1px solid rgba(255,255,255,0.14);text-align:center;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1);}
    @keyframes slideUp{from{transform:translateX(-50%) translateY(80px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
    #alert-popup .al-close{display:block;font-size:11px;opacity:.4;text-align:right;margin-bottom:8px;}
    #alert-popup .al-title{font-size:12px;opacity:.55;margin-bottom:6px;}
    #alert-popup .al-countdown{font-size:44px;font-weight:700;letter-spacing:-.5px;line-height:1;margin-bottom:4px;}
    #alert-popup .al-clock{font-size:17px;opacity:.62;margin-bottom:10px;}
    #alert-popup .al-event{font-size:15px;opacity:.72;border-top:1px solid rgba(255,255,255,0.12);padding-top:10px;}
    #alert-popup .al-hint{font-size:11px;opacity:.3;margin-top:8px;}
/* 체크 버튼 */
#action-buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:.45rem;
  margin-top:.35rem;
}

.action-btn{
  position:relative;
  border:none;
  border-radius:18px;
  padding:.85rem .4rem;
  font-family:inherit;
  font-size:16px;
  font-weight:600;
  background:rgba(255,255,255,0.32);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  color:inherit;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
  transition:transform .12s ease, box-shadow .2s ease, background .2s ease, opacity .2s ease;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  min-height:74px;
}

.action-btn:active{
  transform:scale(0.94);
}

.action-btn:hover{
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

.action-btn.wake{background:rgba(255,230,140,0.28);}
.action-btn.sleep{background:rgba(180,190,255,0.25);}
.action-btn.med{background:rgba(180,255,210,0.22);}

.btn-emoji{
  font-size:22px;
  line-height:1;
}

.btn-text{
  font-size:15px;
  line-height:1.1;
}

.action-btn.done{
  opacity:.72;
  box-shadow:none;
}

.action-btn.saving{
  transform:scale(0.96);
}

#toast{
  position:fixed;
  left:50%;
  bottom:90px;
  transform:translateX(-50%) translateY(16px);
  background:rgba(20,28,40,0.92);
  color:#fff;
  padding:12px 18px;
  border-radius:999px;
  font-size:14px;
  font-weight:600;
  opacity:0;
  pointer-events:none;
  z-index:1000;
  transition:opacity .25s ease, transform .25s ease;
  white-space:nowrap;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

#emoji-pop-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1001;
}

.emoji-pop{
  position:fixed;
  font-size:28px;
  animation:emojiFloat .9s ease-out forwards;
}

@keyframes emojiFloat{
  0%{
    transform:translate(-50%,0) scale(.8);
    opacity:0;
  }
  15%{
    opacity:1;
  }
  100%{
    transform:translate(-50%,-46px) scale(1.18);
    opacity:0;
  }
}
  </style>
</head>
<body>
<div id="bg-wrap">
  <div id="sun"><div id="sun-rays"></div></div>
  <div id="moon"></div>

</div>

<div id="dash">

    <div id="weekly-row"></div>

  <!-- 2행: 날짜+시간 -->

  <!-- 5행: 날씨 / 멘트 / 시설 -->
  <div id="bottom-row">
    <div id="weather-card" class="card">
      <div class="section-label">날씨 · 마포구 서교동</div>
      <div class="weather-top">
        <div id="weather-icon" style="font-size:46px;">🌤</div>
        <div class="weather-meta">
          <div class="weather-temp" id="weather-temp">--°</div>
          <span id="weather-desc">확인 중...</span>
          <span id="weather-feels"></span>
        </div>
      </div>
    </div>
    <div id="comment-card" class="card">
      <div class="section-label">날씨 한마디</div>

    </div>
     <div id="facility-card" class="card">
      <div class="section-label">커뮤니티 시설</div>

  <div id="action-buttons">
    <button class="action-btn wake" onclick="logAction('일어남')">
      <span class="btn-emoji">☀️</span>

    <button class="action-btn sleep" onclick="logAction('잘래')">
      <span class="btn-emoji">🌙</span>
      <span class="btn-text">잘래</span>

    <button class="action-btn med" onclick="logAction('아침약')">
      <span class="btn-emoji">💊</span>
      <span class="btn-text">아침약</span>
    </button>

    <button class="action-btn med" onclick="logAction('저녁약')">
      <span class="btn-emoji">💊</span>
      <span class="btn-text">저녁약</span>
    </button>
  </div>

  <div id="toast"></div>
  <div id="emoji-pop-layer"></div>

</div>

<div id="alert-popup" onclick="closeAlert()">
  <span class="al-close">탭해서 닫기 ✕</span>
  <div class="al-title">🔔 곧 일정이 있어요</div>
  <div class="al-countdown" id="al-countdown"></div>
  <div class="al-clock" id="al-time-text"></div>
  <div class="al-event" id="al-event-title"></div>
  <div class="al-hint">탭하면 닫혀요 · 15초 후 자동으로 사라져요</div>
</div>

<script>
var FIXED_LAT=37.5546,FIXED_LON=126.9236;
var SHEET_ID="1Iu8teB0ds5lzNVZwb-V353WnEjzlSU4anMAcMZJ0LY4";
var OPENSHEET_URL="https://opensheet.elk.sh/"+SHEET_ID+"/%EC%8B%9C%ED%8A%B81";
var HOLIDAYS_2026={
  '2026-01-01':'신정','2026-01-28':'설연휴','2026-01-29':'설날','2026-01-30':'설연휴',
  '2026-03-01':'삼일절','2026-05-05':'어린이날','2026-05-25':'부처님오신날',
  '2026-06-06':'현충일','2026-08-15':'광복절','2026-10-03':'개천절',
  '2026-10-04':'추석','2026-10-05':'추석연휴','2026-10-09':'한글날','2026-12-25':'성탄절',
};
var DAYS_KR=["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
var DAYS_SHORT=["일","월","화","수","목","금","토"];
var MONTHS_KR=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
var FAC={
  gym:{name:"🏋 헬스장",hours:{0:"10:00~18:00",1:null,2:"06:00~23:00",3:"06:00~23:00",4:"06:00~23:00",5:"06:00~23:00",6:"06:00~23:00"}},
  roof:{name:"🏙 옥상",hours:{0:"08:00~22:00",1:"08:00~22:00",2:"08:00~22:00",3:"08:00~22:00",4:"08:00~22:00",5:"08:00~22:00",6:"08:00~22:00"}},
  library:{name:"📚 도서관",hours:{0:null,1:null,2:"10:00~19:00",3:"10:00~19:00",4:"10:00~19:00",5:"10:00~19:00",6:"10:00~18:00"}},
};

var THEMES={
  clearDay:    {bg:"linear-gradient(180deg,#4A90D9 0%,#72AEDE 40%,#A8CFEA 72%,#C8E4F4 100%)",text:"#1A3A58",timeColor:"#2A6AA8",card:"rgba(255,255,255,0.46)"},
  sunrise:     {bg:"linear-gradient(180deg,#5B6BAE 0%,#A07EB8 30%,#E89878 62%,#F8CFA0 100%)",text:"#2A1840",timeColor:"#7A4080",card:"rgba(255,255,255,0.40)"},
  sunset:      {bg:"linear-gradient(180deg,#5068A8 0%,#9868A8 28%,#D87868 58%,#F0B080 100%)",text:"#201030",timeColor:"#6838A0",card:"rgba(255,255,255,0.38)"},
  clearNight:  {bg:"linear-gradient(180deg,#1E2C4A 0%,#283C5E 45%,#344D78 100%)",text:"#D8E8FF",timeColor:"#90B0E0",card:"rgba(20,30,55,0.55)"},
  deepNight:   {bg:"linear-gradient(180deg,#141E32 0%,#1A2840 50%,#203050 100%)",text:"#C0D0E8",timeColor:"#7090C0",card:"rgba(12,18,35,0.58)"},
  partlyCloudy:{bg:"linear-gradient(180deg,#5898C8 0%,#80B4D4 38%,#A8CCDE 72%,#C8DDE8 100%)",text:"#183048",timeColor:"#2A6090",card:"rgba(255,255,255,0.46)"},
  cloudy:      {bg:"linear-gradient(180deg,#6A8098 0%,#8A9EB0 38%,#A8B8C4 72%,#C0CDD6 100%)",text:"#1E2C38",timeColor:"#3A5870",card:"rgba(255,255,255,0.46)"},
  foggy:       {bg:"linear-gradient(180deg,#9AAAB2 0%,#B0BEC6 48%,#CDD8DC 100%)",text:"#243038",timeColor:"#485A68",card:"rgba(255,255,255,0.48)"},
  drizzle:     {bg:"linear-gradient(180deg,#4A607A 0%,#607888 48%,#7E9098 100%)",text:"#D8E5EE",timeColor:"#90B0C8",card:"rgba(30,42,55,0.52)"},
  rain:        {bg:"linear-gradient(180deg,#344456 0%,#445464 45%,#546475 100%)",text:"#D0DDE8",timeColor:"#7898B8",card:"rgba(22,32,45,0.55)"},
  snow:        {bg:"linear-gradient(180deg,#8898A8 0%,#A8B8C8 42%,#C8D8E0 72%,#E0EAED 100%)",text:"#1E2E3A",timeColor:"#486078",card:"rgba(255,255,255,0.50)"},
  storm:       {bg:"linear-gradient(180deg,#222C40 0%,#2C3850 45%,#384560 100%)",text:"#C0D0E0",timeColor:"#6888B0",card:"rgba(15,20,35,0.60)"},
};

function getThemeKey(code,hour){
  var night=hour<5||hour>=21,sunrise=hour>=5&&hour<8,sunset=hour>=18&&hour<21,deep=hour>=23||hour<4;
  if(code===0||code===1){if(deep)return'deepNight';if(night)return'clearNight';if(sunrise)return'sunrise';if(sunset)return'sunset';return'clearDay';}
  if(code===2)return night?'cloudy':'partlyCloudy';
  if(code===3)return'cloudy';
  if(code===45||code===48)return'foggy';
  if(code===51||code===53||code===55)return'drizzle';
  if(code===61||code===63||code===65||code===80||code===81||code===82)return'rain';
  if(code===71||code===73||code===75||code===77)return'snow';
  if(code===95||code===96||code===99)return'storm';
  return night?'clearNight':'clearDay';
}

var currentKey='',animFrame=null,ltTimer=null;
function applyTheme(key){
  var t=THEMES[key]||THEMES.clearDay;
  document.getElementById('bg-wrap').style.background=t.bg;
  document.getElementById('dash').style.color=t.text;
  document.getElementById('time-display').style.color=t.timeColor;
  document.querySelectorAll('.card').forEach(function(c){c.style.background=t.card;});
  if(key===currentKey)return;
  currentKey=key;
  buildScene(key);
  startParticles(key);
}

function buildScene(key){
  var sun=document.getElementById('sun'),moon=document.getElementById('moon'),cw=document.getElementById('clouds-wrap');
  var rays=document.getElementById('sun-rays');
  if(!rays.dataset.built){
    rays.dataset.built='1';
    for(var i=0;i<12;i++){var ray=document.createElement('div');ray.className='ray';var len=32+(i%3)*12,total=44+len;ray.style.cssText='height:'+total+'px;width:2px;left:43px;top:'+(44-total)+'px;transform-origin:50% 100%;transform:rotate('+(i*30)+'deg);';rays.appendChild(ray);}
  }
  sun.style.display=(key==='clearDay'||key==='sunrise')?'block':'none';
  moon.style.display=(key==='clearNight'||key==='deepNight')?'block':'none';
  cw.innerHTML='';
  var cloudKeys=['partlyCloudy','cloudy','drizzle','rain','storm','sunset'];
  if(cloudKeys.indexOf(key)>=0){
    var cnt=(key==='cloudy'||key==='rain'||key==='storm')?6:3;
    var dark=(key==='rain'||key==='storm'||key==='drizzle');
    for(var i=0;i<cnt;i++){var cl=document.createElement('div');cl.className='cloud';var w=110+Math.random()*160,h=w*.36,top=20+Math.random()*200,dur=45+Math.random()*55,delay=-Math.random()*dur,color=dark?'rgba(35,45,58,0.82)':'rgba(255,255,255,0.78)';cl.style.cssText='width:'+w+'px;height:'+h+'px;top:'+top+'px;background:'+color+';animation-duration:'+dur+'s;animation-delay:'+delay+'s;';cl.innerHTML='<div style="position:absolute;width:'+(h*1.5)+'px;height:'+(h*1.5)+'px;background:'+color+';border-radius:50%;top:-'+(h*.55)+'px;left:'+(w*.18)+'px;"></div><div style="position:absolute;width:'+(h*1.2)+'px;height:'+(h*1.2)+'px;background:'+color+';border-radius:50%;top:-'+(h*.38)+'px;left:'+(w*.44)+'px;"></div>';cw.appendChild(cl);}
  }
  if(ltTimer){clearInterval(ltTimer);ltTimer=null;}
  if(key==='storm'){ltTimer=setInterval(function(){if(Math.random()<0.28){var el=document.getElementById('lightning');el.style.background='rgba(200,220,255,0.38)';setTimeout(function(){el.style.background='rgba(200,220,255,0)';},90);}},3200);}
}

function startParticles(key){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  var canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var pts=[];
  if(key==='rain'||key==='drizzle'||key==='storm'){
    var cnt=key==='drizzle'?75:220;
    for(var i=0;i<cnt;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,spd:key==='drizzle'?3+Math.random()*3:10+Math.random()*10,len:key==='drizzle'?7+Math.random()*7:14+Math.random()*18,op:.18+Math.random()*.38});
    (function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(function(p){ctx.beginPath();ctx.lineWidth=1;ctx.globalAlpha=p.op;ctx.strokeStyle='rgba(175,210,255,1)';ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.len*.18,p.y-p.len);ctx.stroke();p.y+=p.spd;p.x+=p.spd*.18;if(p.y>canvas.height){p.y=-20;p.x=Math.random()*canvas.width;}});ctx.globalAlpha=1;animFrame=requestAnimationFrame(loop);})();
  } else if(key==='snow'){
    for(var i=0;i<130;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:1.5+Math.random()*3.5,spd:.4+Math.random()*1.2,dr:(Math.random()-.5)*.25,op:.55+Math.random()*.45,a:Math.random()*Math.PI*2});
    (function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+p.op+')';ctx.fill();p.y+=p.spd;p.a+=.018;p.x+=Math.sin(p.a)*p.dr;if(p.y>canvas.height){p.y=-8;p.x=Math.random()*canvas.width;}});animFrame=requestAnimationFrame(loop);})();
  } else if(key==='clearNight'||key==='deepNight'){
    for(var i=0;i<110;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height*.72,r:.4+Math.random()*1.6,base:.25+Math.random()*.75,spd:.008+Math.random()*.025,off:Math.random()*Math.PI*2});
    var t=0;(function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);t+=.018;pts.forEach(function(p){var op=p.base*(.5+.5*Math.sin(t*p.spd*60+p.off));ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,252,230,'+op+')';ctx.fill();});animFrame=requestAnimationFrame(loop);})();
  }
}

function to12h(ts){var h=parseInt(ts.slice(0,2)),m=ts.slice(3,5);return(h<12?'오전':'오후')+' '+(h%12||12)+':'+m;}
function facTime(t){if(!t)return'휴무';var p=t.split('~');return p.length===2?to12h(p[0])+' ~ '+to12h(p[1]):t;}

/* ── 위클리 캘린더 ── */
var currentEventDates=[];
function buildWeekly(){
  var now=new Date();
  var dow=now.getDay();
  var monday=new Date(now);
  monday.setDate(now.getDate()-((dow+6)%7));
  var row=document.getElementById('weekly-row');
  row.innerHTML='';
  for(var i=0;i<7;i++){
    var d=new Date(monday);
    d.setDate(monday.getDate()+i);
    var isToday=d.toDateString()===now.toDateString();
    var dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var hasEvent=currentEventDates.indexOf(dateStr)>=0;
    var holiday=HOLIDAYS_2026[dateStr]||'';
    var isSat=d.getDay()===6;
    var isSun=d.getDay()===0;
    var isRed=isSun||!!holiday;
    var dayNameColor=isRed?'color:rgba(255,90,90,0.95);':isSat?'color:rgba(80,170,255,0.95);':'';
    var bottom='';
    if(hasEvent) bottom='<span class="week-dot" style="background:#FFD700;opacity:1;"></span>';
    else if(holiday) bottom='<span style="font-size:8px;opacity:.75;'+(isRed?'color:rgba(255,100,100,.9)':'')+';line-height:1;display:block;text-align:center;white-space:nowrap;overflow:hidden;max-width:100%;">'+holiday+'</span>';
    else bottom='<span class="week-dot"></span>';
    var div=document.createElement('div');
    div.className='week-day'+(isToday?' today':'');
    div.innerHTML=
      '<span class="week-day-name" style="'+dayNameColor+'">'+DAYS_SHORT[d.getDay()]+'</span>'+
      '<span class="week-date">'+(d.getMonth()+1)+'/'+d.getDate()+'</span>'+
      bottom;
    row.appendChild(div);
  }
}

function updateClock(){
  var now=new Date(),h=now.getHours();
  document.getElementById('time-display').textContent=' '+to12h(String(h).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'));
  document.getElementById('date-display').textContent=now.getFullYear()+'년 '+MONTHS_KR[now.getMonth()]+' '+now.getDate()+'일 '+DAYS_KR[now.getDay()];
  document.getElementById('theme-icon').textContent=THEMES[currentKey]?'':' ';
}

function loadFacility(){
  var dow=new Date().getDay();
  document.getElementById('facility-list').innerHTML=['gym','roof','library'].map(function(k){var f=FAC[k],t=f.hours[dow];return'<div class="fac-row"><span class="fac-name'+(!t?' closed':'')+'">'+f.name+'</span><span class="fac-time'+(!t?' closed':'')+'">'+facTime(t)+'</span></div>';}).join('');
}

function renderEvents(events){
  var list=document.getElementById('events-list');
  var now=new Date(),todayMid=new Date(now.getFullYear(),now.getMonth(),now.getDate()),todayStr=now.toISOString().slice(0,10);
  currentEventDates=events.map(function(e){return e.date;});
  buildWeekly();
  var sorted=events.filter(function(e){return e.date>=todayStr;}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);}).slice(0,4);
  if(!sorted.length){list.innerHTML='<div style="opacity:.4;font-size:17px;padding:6px 0;">다가오는 일정이 없어요 😊</div>';return;}
  list.innerHTML=sorted.map(function(ev){
    var evDate=new Date(ev.date+'T'+ev.time);
    var diff=Math.round((new Date(evDate.getFullYear(),evDate.getMonth(),evDate.getDate())-todayMid)/86400000);
    var dt=diff===0?'D-day':'D-'+diff;
    var dc=diff===0?'dday-today':diff===1?'dday-soon':'dday-later';
    var mo=parseInt(ev.date.slice(5,7)),d=parseInt(ev.date.slice(8,10));
    var bc=ev.type==='repeat'?'rgba(121,134,203,0.28)':'rgba(100,180,120,0.22)';
    var bt=ev.type==='repeat'?'🔁 '+ev.note:'1회';
    return'<div class="event-item"><div class="event-dday '+dc+'">'+dt+'</div><div class="event-when"><span class="event-date-txt">'+mo+'월 '+d+'일 ('+DAYS_KR[evDate.getDay()]+')</span><span class="event-sep">·</span><span class="event-time-txt">'+to12h(ev.time)+'</span></div><span class="event-title">'+ev.title+'</span><span class="event-badge" style="background:'+bc+';">'+bt+'</span></div>';
  }).join('');
}

function fetchSheetData(){
  fetch(OPENSHEET_URL).then(function(r){return r.json();}).then(function(rows){
    var data={};rows.forEach(function(row){if(row.key)data[row.key]=row.value||'';});
    document.getElementById('quote-text').textContent='🙋🏻\u200d♀️ \u201C'+(data['quote']||'오늘 하루도 충분히 잘하고 있어요.')+'\u201D 💕';
    document.getElementById('quote-author').textContent=data['author']?'— '+data['author']:'';
    var events=[];
    for(var i=1;i<=10;i++){if(data['event'+i+'_date']&&data['event'+i+'_time']&&data['event'+i+'_title']){var rep=data['event'+i+'_repeat']||'';events.push({date:data['event'+i+'_date'],time:data['event'+i+'_time'],title:data['event'+i+'_title'],type:rep?'repeat':'one-time',note:rep});}}
    renderEvents(events);
    var now=new Date();
    document.getElementById('sync-status').textContent=to12h(String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'))+' 업데이트됨';
  }).catch(function(){document.getElementById('quote-text').textContent='🙋🏻\u200d♀️ \u201C오늘 하루도 충분히 잘하고 있어요.\u201D 💕';document.getElementById('sync-status').textContent='오프라인';});
}

/* ── 날씨 ── */
function makeComments(cur,high,low,maxP,aftP){
  var lines=[],diff=high-low,h=new Date().getHours();
  if(maxP>=70)lines.push('☂️ 우산 꼭 챙겨요!');
  else if(aftP>=50)lines.push('🌂 오후에 우산 챙겨요');
  else if(maxP>=30)lines.push('🌦 우산 챙겨두면 좋아요');
  else lines.push('☀️ 우산 없이 괜찮아요');
  if(diff>=10)lines.push('🧥 일교차 '+Math.round(diff)+'도! 겉옷 챙겨요');
  else if(diff>=7)lines.push('🌡 저녁엔 쌀쌀할 수 있어요');
  if(cur<=2)lines.push('🥶 많이 추워요. 따뜻하게 입어요');
  else if(cur<=8)lines.push('🧤 쌀쌀해요. 손 챙겨요');
  else if(cur>=28)lines.push('🥵 많이 더워요. 물 자주 마셔요');
  else if(cur>=23)lines.push('😊 오늘 날씨 따뜻해요');
  if(h>=5&&h<9)lines.push('🍳 아침 챙겨 먹었어요?');
  else if(h>=18&&h<21)lines.push('🌙 오늘도 수고했어요');
  return lines.slice(0,3);
}

function loadWeather(){
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+FIXED_LAT+'&longitude='+FIXED_LON+'&current=temperature_2m,apparent_temperature,weather_code&hourly=precipitation_probability&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul&forecast_days=1')
    .then(function(r){return r.json();})
    .then(function(data){
      var cur=Math.round(data.current.temperature_2m),feels=Math.round(data.current.apparent_temperature),code=data.current.weather_code;
      var high=Math.round(data.daily.temperature_2m_max[0]),low=Math.round(data.daily.temperature_2m_min[0]);
      var probs=(data.hourly&&data.hourly.precipitation_probability)||[];
      var maxP=Math.max.apply(null,probs.slice(0,24)),aftP=Math.max.apply(null,probs.slice(12,18));
      var icons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',53:'🌦️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',80:'🌦️',95:'⛈️'};
      var descs={0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',51:'이슬비',53:'이슬비',61:'비',63:'비',65:'강한 비',71:'눈',80:'소나기',95:'뇌우'};
      document.getElementById('weather-icon').textContent=icons[code]||'🌡️';
      document.getElementById('weather-temp').textContent=cur+'°';
      document.getElementById('weather-desc').textContent=(descs[code]||'')+'  최고 '+high+'° / 최저 '+low+'°';
      document.getElementById('weather-feels').textContent='체감 '+feels+'°';
      document.getElementById('weather-comments').innerHTML=makeComments(cur,high,low,maxP,aftP).map(function(c){return'<span class="wcl">'+c+'</span>';}).join('');
      var key=getThemeKey(code,new Date().getHours());
      applyTheme(key);
      document.getElementById('theme-icon').textContent=icons[code]||'🌡️';
    }).catch(function(){function fixHeight(){document.getElementById('dash').style.height=window.innerHeight+'px';}
fixHeight();
window.addEventListener('resize',fixHeight);
window.addEventListener('orientationchange',function(){setTimeout(fixHeight,300);});
applyTheme(getThemeKey(0,new Date().getHours()));});
}

/* ── 알림 ── */
var notifiedEvents={},currentEvents=[];
function playChime(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var melody=[[523,0.00,0.45,0.18],[659,0.38,0.35,0.18],[784,0.68,0.35,0.18],[1047,0.96,0.65,0.20],[1319,1.54,0.32,0.16],[1047,1.80,0.32,0.18],[880,2.06,0.42,0.18],[784,2.44,0.55,0.18],[659,2.92,0.30,0.16],[784,3.16,0.30,0.18],[880,3.40,0.32,0.18],[1047,3.65,0.72,0.20],[880,4.30,0.30,0.16],[784,4.55,0.38,0.16],[659,4.87,0.32,0.16],[523,5.12,1.00,0.18]];
    melody.forEach(function(n){var osc=ac.createOscillator(),g=ac.createGain();osc.connect(g);g.connect(ac.destination);osc.frequency.value=n[0];osc.type='sine';var t=ac.currentTime+n[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(n[3],t+0.05);g.gain.setValueAtTime(n[3],t+n[2]*.55);g.gain.exponentialRampToValueAtTime(0.001,t+n[2]+0.25);osc.start(t);osc.stop(t+n[2]+0.3);var o2=ac.createOscillator(),g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);o2.frequency.value=n[0]*2;o2.type='triangle';g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(n[3]*0.07,t+0.04);g2.gain.exponentialRampToValueAtTime(0.001,t+n[2]*.45);o2.start(t);o2.stop(t+n[2]*.5);});
  }catch(e){}
}
function closeAlert(){document.getElementById('alert-popup').style.display='none';}
function checkAlerts(){
  var now=new Date(),todayStr=now.toISOString().slice(0,10);
  currentEvents.forEach(function(ev){
    if(ev.date<todayStr)return;
    var evTime=new Date(ev.date+'T'+ev.time),diffMin=(evTime-now)/60000;
    var k30=ev.date+ev.time+'_30',k10=ev.date+ev.time+'_10';
    var trigKey=null,minsLeft=0;
    if(diffMin>0&&diffMin<=30&&diffMin>29&&!notifiedEvents[k30]){trigKey=k30;minsLeft=30;}
    else if(diffMin>0&&diffMin<=10&&diffMin>9&&!notifiedEvents[k10]){trigKey=k10;minsLeft=10;}
    if(trigKey){
      notifiedEvents[trigKey]=true;
      document.getElementById('al-countdown').textContent=minsLeft+'분 후';
      document.getElementById('al-time-text').textContent=to12h(ev.time);
      document.getElementById('al-event-title').textContent=ev.title;
      var popup=document.getElementById('alert-popup');
      popup.style.display='block';popup.style.animation='none';popup.offsetHeight;popup.style.animation='slideUp .4s cubic-bezier(.34,1.56,.64,1)';
      playChime();
      setTimeout(closeAlert,15000);
    }
  });
}

function fixHeight(){document.getElementById('dash').style.height=window.innerHeight+'px';}
fixHeight();
window.addEventListener('resize',fixHeight);
window.addEventListener('orientationchange',function(){setTimeout(fixHeight,300);});
applyTheme(getThemeKey(0,new Date().getHours()));
buildWeekly();
updateClock();
loadFacility();
loadWeather();
fetchSheetData();
setInterval(updateClock,10000);
setInterval(fetchSheetData,30000);
setInterval(loadWeather,600000);
setInterval(checkAlerts,30000);
window.addEventListener('resize',function(){var c=document.getElementById('bg-canvas');c.width=window.innerWidth;c.height=window.innerHeight;});
</script>
