<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>우리 집 대시보드</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&display=swap">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--block-gap:.74rem;}
    html,body{height:100%;overflow:hidden;}
    #bg-wrap{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;transition:background 4s ease;}
    #bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
    #lightning{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;background:rgba(200,220,255,0);transition:background 0.05s;}

    /* ── 태양 ── */
    #sun{position:absolute;width:96px;height:96px;border-radius:50%;
      background:radial-gradient(circle at 38% 35%,#fffbe0,#ffe040 45%,#ffaa00 75%,#ff7700);
      box-shadow:0 0 40px 8px rgba(255,200,0,0.7),0 0 90px 20px rgba(255,150,0,0.4),0 0 160px 40px rgba(255,100,0,0.18);
      top:48px;right:120px;display:none;animation:sunPulse 5s ease-in-out infinite;overflow:visible;}
    #sun-rays{position:absolute;top:0;left:0;width:96px;height:96px;animation:raysRotate 28s linear infinite;}
    .ray{position:absolute;border-radius:3px;background:linear-gradient(to bottom,rgba(255,230,80,0.9),rgba(255,180,0,0.3) 50%,transparent);transform-origin:50% 100%;}
    @keyframes sunPulse{
      0%,100%{box-shadow:0 0 40px 8px rgba(255,200,0,0.7),0 0 90px 20px rgba(255,150,0,0.4),0 0 160px 40px rgba(255,100,0,0.18);}
      50%{box-shadow:0 0 60px 14px rgba(255,220,0,0.85),0 0 120px 30px rgba(255,160,0,0.55),0 0 200px 60px rgba(255,120,0,0.22);}
    }
    @keyframes raysRotate{to{transform:rotate(360deg);}}

    /* ── 달 ── */
    #moon{position:absolute;width:70px;height:70px;border-radius:50%;
      background:radial-gradient(circle at 38% 35%,#fffff8,#e8e2c8 55%,#c8c0a0);
      box-shadow:0 0 24px 6px rgba(220,210,170,0.6),0 0 60px 16px rgba(200,190,140,0.28),inset -16px -5px 0 rgba(0,0,0,0.18);
      top:52px;right:118px;display:none;animation:moonGlow 6s ease-in-out infinite;}
    @keyframes moonGlow{
      0%,100%{box-shadow:0 0 24px 6px rgba(220,210,170,0.6),0 0 60px 16px rgba(200,190,140,0.28),inset -16px -5px 0 rgba(0,0,0,0.18);}
      50%{box-shadow:0 0 36px 10px rgba(230,220,180,0.75),0 0 90px 24px rgba(210,200,150,0.38),inset -16px -5px 0 rgba(0,0,0,0.18);}
    }

    /* ── 구름 ── */
    .cloud{position:absolute;animation:cloudDrift linear infinite;filter:blur(0px);}
    @keyframes cloudDrift{from{transform:translateX(-120%) translateZ(0)}to{transform:translateX(calc(100vw + 120%)) translateZ(0)}}

    /* ── 안개 ── */
    #fog-wrap{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
    .fog-band{position:absolute;width:220%;height:80px;border-radius:50%;opacity:0;animation:fogDrift linear infinite;}
    @keyframes fogDrift{from{transform:translateX(-60%)}to{transform:translateX(20%)}}

    /* ── 전체 레이아웃 ── */
    #dash{
      position:relative;
      z-index:2;
      width:100%;
      height:100vh;
      height:-webkit-fill-available;
      padding:0.35rem 0.4rem 1.1rem;
      font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
      display:flex;
      flex-direction:column;
      gap:0.28rem;
      overflow:hidden;
      transition:color 2.5s ease;
    }

    .section-label{
      font-size:10px;
      font-weight:500;
      letter-spacing:.1em;
      text-transform:uppercase;
      opacity:.38;
      margin-bottom:8px;
    }

    .card{
      border-radius:20px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.16);
      border:1px solid rgba(255,255,255,0.08);
      overflow:hidden;
    }

    /* ── 위클리 캘린더 (고정) ── */
    #weekly-card{flex-shrink:0;padding:.3rem 0.8rem;}
    #weekly-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .week-day{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;border-radius:10px;transition:background .3s;}
    .week-day-name{font-size:11px;font-weight:500;opacity:.48;text-transform:uppercase;}
    .week-date{font-size:15px;font-weight:500;opacity:.65;}
    .week-dot{width:5px;height:5px;border-radius:50%;margin-top:1px;opacity:0;}
    .week-day.today{background:rgba(255,255,255,0.24);border-radius:12px;}
    .week-day.today .week-day-name{opacity:.88;font-weight:700;}
    .week-day.today .week-date{font-size:20px;font-weight:700;opacity:1;}
    .week-day.has-event .week-dot{opacity:.75;}

    /* ── 날짜+시간 (고정, 대형) ── */
    #header-card{
      display:flex;
      justify-content:center;
      align-items:center;
      flex-shrink:0;
      position:relative;

      min-height:180px;
      padding:0.8rem 1rem;
      margin:0;
    }
    #header-center{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0;
    }
    #date-line1{display:none;}
    #date-line2{
      display:flex;
      justify-content:center;
      align-items:flex-end;
      gap:0.36em;
      font-size:84px;
      font-weight:700;
      line-height:1;
      letter-spacing:-.5px;
      white-space:nowrap;
    }
    #date-part{
      display:inline-block;
      opacity:.88;
      line-height:1;
    }
    #time-wrap{
      display:inline-flex;
      align-items:baseline;
      gap:0.08em;
      padding-bottom:0;
    }
    #time-ampm{
      font-size:0.58em;
      font-weight:800;
      display:inline-block;
      vertical-align:baseline;
      line-height:1;
      transform:translateY(2px);
      transition:color 2.5s ease;
      margin-left:0;
      margin-right:0;
      letter-spacing:0.01em;
    }
    #time-digital{
      font-family:'Orbitron',sans-serif;
      font-size:1em;
      font-weight:800;
      display:inline-block;
      vertical-align:bottom;
      line-height:1;
      transition:color 2.5s ease;
      letter-spacing:0.04em;
    }
    #time-colon{
      animation:colonBlink 1s step-end infinite;
      display:inline-block;
    }
    @keyframes colonBlink{
      0%,49%{opacity:1;}
      50%,100%{opacity:0;}
    }
    #theme-icon{position:absolute;right:.7rem;top:.7rem;font-size:28px;}

    /* ── 콘텐츠 구역 ── */
    #switch-zone{
      flex:1 1 0;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:var(--block-gap);
      overflow:hidden;
      margin-top:0;
    }

    /* ── 오늘의 한마디 (전환구역 상단 고정) ── */
    #quote-card{
      flex-shrink:0;
      min-height:96px;
      margin-bottom:0;
      padding:.42rem 0.9rem;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .quote-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .quote-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;opacity:.38;}
    #sync-status{font-size:10px;opacity:.28;}
    .quote-body{
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      flex:1;
      min-width:0;
      overflow:hidden;
    }
    .quote-track{
      width:100%;
      overflow:hidden;
      position:relative;
      white-space:nowrap;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .quote-text{
      font-size:46px;
      line-height:1.35;
      opacity:.95;
      font-weight:500;
      display:inline-block;
      white-space:nowrap;
      will-change:transform;
      transform:translateX(0);
    }
    .quote-text.marquee{
      animation:quoteMarquee var(--quote-duration, 10s) linear infinite;
    }
    @keyframes quoteMarquee{
      0%{transform:translateX(0);}
      16%{transform:translateX(0);}
      84%{transform:translateX(calc(-1 * var(--quote-shift, 0px)));}
      100%{transform:translateX(calc(-1 * var(--quote-shift, 0px)));}
    }
    .quote-author{font-size:14px;opacity:.38;margin-top:5px;text-align:center;}

    /* ── 다가오는 일정 ── */
    #panel-events{
      flex:1 1 0;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    #events-card{
      flex:1 1 0;
      min-height:0;
      overflow:hidden;
      padding:10px 14px 8px;
    }
    .event-item:last-child{border-bottom:none;}
    .event-item{
      display:grid;
      grid-template-columns:92px minmax(176px,204px) minmax(78px,92px) minmax(0,1fr) minmax(130px,180px) 92px;
      align-items:center;
      column-gap:8px;
      padding:10px 8px;
      border-bottom:1px solid rgba(128,128,128,.12);
    }
    .event-dday{font-size:19px;font-weight:700;min-width:62px;text-align:center;padding:5px 8px;border-radius:8px;justify-self:start;width:88px;}
    .dday-today{background:rgba(200,0,0,.16);color:#c00;}
    .dday-soon{background:rgba(200,0,0,.12);color:#c00;}
    .dday-later{background:rgba(128,128,128,.15);}
    .event-date-txt{font-size:26px;font-weight:500;opacity:.9;white-space:nowrap;letter-spacing:-.01em;}
    .event-time-txt{font-size:26px;opacity:.65;white-space:nowrap;letter-spacing:-.01em;margin-left:-50px;}
    .event-title{font-size:30px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:-30px;}
    .event-extra{
      font-size:20px;
      opacity:.62;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:left;
      padding-left:4px;
    }
    .event-badge{font-size:16px;padding:3px 9px;border-radius:6px;opacity:.7;white-space:nowrap;justify-self:end;}

    /* ── 날씨삼총사 ── */
    #weather-btn-row{
      flex:0 0 auto;
    }
    #bottom-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:var(--block-gap);
      align-items:stretch;
      height:130px;
    }
    #weather-card{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:.4rem .6rem;
    }
    .weather-main-row{
      display:flex;
      flex-direction:row;
      align-items:center;
      justify-content:center;
      gap:8px;
      width:100%;
    }
    .weather-bubble{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:rgba(128,128,128,0.13);
      border-radius:12px;
      padding:5px 10px;
      width:72px;
      height:56px;
      flex-shrink:0;
    }
    .weather-bubble .bubble-label{font-size:10px;opacity:.55;font-weight:500;line-height:1.5;}
    .weather-bubble .bubble-val{font-size:15px;font-weight:700;line-height:1.3;}
    /* 최고최저 버블 */
    .bubble-hilo{}
    .bubble-hilo .bubble-label{font-size:11px;opacity:.7;}
    /* 날씨설명 버블 — 더 크고 진하게 */
    .bubble-desc{}
    .bubble-desc .bubble-val{font-size:16px;font-weight:800;opacity:1;}
    .weather-center{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:1px;
    }
    .weather-temp{font-size:44px;font-weight:500;line-height:1;}
    .weather-desc-row{font-size:12px;opacity:.6;margin-top:2px;}
    .weather-meta{display:none;}
    #weather-comments{
      width:100%;
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      transform:none;
    }
    #comment-card{
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      align-items:center;
      gap:10px;
      text-align:center;
      padding:.5rem .8rem;
    }
    #comment-card .section-label,
    #facility-card .section-label{
      margin-bottom:10px;
    }
    .wcl{font-size:15px;font-weight:500;opacity:.9;background:rgba(128,128,128,.14);padding:5px 11px;border-radius:22px;display:inline-block;}
    #facility-card{
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      align-items:center;
      text-align:center;
      padding:.5rem .8rem;
    }
    #facility-list{
      width:100%;
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .fac-row{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(128,128,128,.1);width:100%;}
    .fac-row:last-child{border-bottom:none;}
    .fac-name{font-size:15px;white-space:nowrap;text-align:right;min-width:72px;}
    .fac-time{font-size:15px;font-weight:500;opacity:.75;white-space:nowrap;text-align:left;}
    .closed{opacity:1;text-decoration:none;}

    /* ── 알림 팝업 ── */
    #alert-popup{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(15,22,38,0.94);color:#fff;border-radius:22px;padding:18px 22px;min-width:300px;max-width:520px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 8px 32px rgba(0,0,0,0.45);cursor:pointer;border:1px solid rgba(255,255,255,0.14);text-align:center;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1);}
    @keyframes slideUp{from{transform:translateX(-50%) translateY(80px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
    #alert-popup .al-close{display:block;font-size:11px;opacity:.4;text-align:right;margin-bottom:8px;}
    #alert-popup .al-title{font-size:12px;opacity:.55;margin-bottom:6px;}
    #alert-popup .al-countdown{font-size:44px;font-weight:700;letter-spacing:-.5px;line-height:1;margin-bottom:4px;}
    #alert-popup .al-clock{font-size:17px;opacity:.62;margin-bottom:10px;}
    #alert-popup .al-event{font-size:15px;opacity:.72;border-top:1px solid rgba(255,255,255,0.12);padding-top:10px;}
    #alert-popup .al-hint{font-size:11px;opacity:.3;margin-top:8px;}

    /* ── 버튼구간 (하단 가로 6개) ── */
    #action-buttons{
      display:flex;
      flex-direction:row;
      align-items:center;
      justify-content:space-evenly;
      flex-shrink:0;
      padding:0.6rem 0.4rem;
      width:100%;
    }
    .action-btn{
      position:relative;
      border:none;
      border-radius:50%;
      width:min(88px, calc((100% - 3rem) / 6));
      aspect-ratio:1/1;
      height:auto;
      font-family:inherit;
      font-size:11px;
      font-weight:700;
      color:#32404f;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:3px;
      overflow:hidden;
      isolation:isolate;
      -webkit-tap-highlight-color:transparent;

      background:
        radial-gradient(circle at 33% 26%, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0.16) 20%, rgba(255,255,255,0) 42%),
        linear-gradient(180deg, var(--btn-top) 0%, var(--btn-mid) 55%, var(--btn-bottom) 100%);
      border:1px solid var(--btn-edge);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.24),
        inset 0 -4px 8px rgba(0,0,0,0.09),
        0 5px 0 var(--btn-base),
        0 9px 14px rgba(0,0,0,0.10);
      transition:
        transform .18s ease,
        box-shadow .22s ease,
        filter .22s ease,
        opacity .22s ease,
        background .22s ease;
    }
    .action-btn.goodmorning{
      --btn-top:#ffe57a;
      --btn-mid:#ffd030;
      --btn-bottom:#f0b800;
      --btn-edge:rgba(200,140,0,0.50);
      --btn-base:#c49000;
      color:#5a3e00;
    }
    .action-btn.goodnight{
      --btn-top:#7b82c8;
      --btn-mid:#5c63aa;
      --btn-bottom:#454b90;
      --btn-edge:rgba(50,55,130,0.55);
      --btn-base:#333878;
      color:#e8eaff;
    }
    .action-btn::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 28%, rgba(255,255,255,0.12), rgba(255,255,255,0.02) 45%, rgba(255,255,255,0) 72%);
      z-index:0;
      pointer-events:none;
    }
    .action-btn::after{
      content:"";
      position:absolute;
      left:18%;
      right:18%;
      bottom:12%;
      height:16%;
      border-radius:999px;
      background:rgba(0,0,0,0.06);
      filter:blur(10px);
      z-index:0;
      pointer-events:none;
      opacity:.48;
    }
    .action-btn > *{
      position:relative;
      z-index:1;
    }
    .action-btn:hover{
      transform:translateY(-2px) scale(1.01);
      filter:brightness(1.01);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.28),
        inset 0 -4px 8px rgba(0,0,0,0.09),
        0 6px 0 var(--btn-base),
        0 10px 16px rgba(0,0,0,0.12);
    }
    .action-btn:active{
      transform:translateY(3px) scale(0.985);
      box-shadow:
        inset 0 1px 3px rgba(255,255,255,0.16),
        inset 0 -2px 5px rgba(0,0,0,0.10),
        0 1px 0 var(--btn-base),
        0 4px 8px rgba(0,0,0,0.09);
    }
    .action-btn.wake{
      --btn-top:#edd9a6;
      --btn-mid:#dfc68f;
      --btn-bottom:#cdb374;
      --btn-edge:rgba(170,138,83,0.44);
      --btn-base:#b0935c;
    }
    .action-btn.sleep{
      --btn-top:#ced6e5;
      --btn-mid:#bcc7d9;
      --btn-bottom:#a7b4ca;
      --btn-edge:rgba(117,129,151,0.42);
      --btn-base:#8e9db7;
    }
    .action-btn.morning-med{
      --btn-top:#cfdecf;
      --btn-mid:#bdd0be;
      --btn-bottom:#a8bea9;
      --btn-edge:rgba(103,128,108,0.40);
      --btn-base:#8fa892;
    }
    .action-btn.evening-med{
      --btn-top:#dbcfe3;
      --btn-mid:#c9bdd4;
      --btn-bottom:#b3a9c1;
      --btn-edge:rgba(122,106,139,0.40);
      --btn-base:#9589a6;
    }
    .btn-emoji{
      font-size:22px;
      line-height:1;
      filter:drop-shadow(0 1px 0 rgba(255,255,255,0.12));
    }
    .btn-text{
      font-size:12px;
      line-height:1.1;
      font-weight:800;
      letter-spacing:-0.02em;
      text-shadow:none;
    }
    .action-btn.done{
      filter:brightness(1.08) saturate(.84);
      opacity:.82;
      transform:translateY(2px) scale(.987);
      box-shadow:
        inset 0 1px 3px rgba(255,255,255,0.18),
        inset 0 -2px 5px rgba(0,0,0,0.07),
        0 1px 0 var(--btn-base),
        0 7px 10px rgba(0,0,0,0.08);
    }
    .action-btn.saving{
      transform:translateY(1px) scale(.99);
    }

    /* ── Toast & 애니메이션 ── */
    #toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(16px);background:rgba(20,28,40,0.92);color:#fff;padding:12px 18px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;z-index:1000;transition:opacity .25s ease, transform .25s ease;white-space:nowrap;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #emoji-pop-layer{position:fixed;inset:0;pointer-events:none;z-index:1001;}
    .emoji-pop{position:fixed;font-size:28px;animation:emojiFloat .9s ease-out forwards;}
    @keyframes emojiFloat{0%{transform:translate(-50%,0) scale(.8);opacity:0;}15%{opacity:1;}100%{transform:translate(-50%,-46px) scale(1.18);opacity:0;}}
    #celebration-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1002;}
    .celebrate-item{position:fixed;top:-30px;font-size:28px;animation:fallPop 1.8s linear forwards;}
    @keyframes fallPop{0%{transform:translateY(0) rotate(0deg) scale(.8);opacity:0;}10%{opacity:1;}100%{transform:translateY(110vh) rotate(220deg) scale(1.15);opacity:0;}}
    .confetti-item{position:fixed;font-size:26px;animation:confettiPop 1.1s ease-out forwards;will-change:transform, opacity;}

function applyQuoteMarquee(){
  var track=document.getElementById('quote-track');
  var textEl=document.getElementById('quote-text');
  if(!track||!textEl)return;

  textEl.classList.remove('marquee');
  textEl.style.removeProperty('--quote-duration');
  textEl.style.removeProperty('--quote-shift');
  track.style.justifyContent='center';

  requestAnimationFrame(function(){
    var trackWidth=track.clientWidth;
    var textWidth=textEl.scrollWidth;
    var overflow=textWidth-trackWidth;

    if(overflow>2){
      track.style.justifyContent='flex-start';
      textEl.style.setProperty('--quote-shift', overflow+'px');

      var holdStart=2;
      var holdEnd=2;
      var speed=55; // px per second
      var moveTime=Math.max(4, overflow/speed);
      var totalDuration=holdStart+moveTime+holdEnd;

      textEl.style.setProperty('--quote-duration', totalDuration+'s');
      textEl.classList.add('marquee');
    }else{
      track.style.justifyContent='center';
      textEl.style.transform='translateX(0)';
    }
  });
}

  partlyCloudy:{bg:"linear-gradient(180deg,#5898C8 0%,#80B4D4 38%,#A8CCDE 72%,#C8DDE8 100%)",text:"#183048",timeColor:"#2A6090",card:"rgba(255,255,255,0.46)"},
  cloudy:      {bg:"linear-gradient(180deg,#6A8098 0%,#8A9EB0 38%,#A8B8C4 72%,#C0CDD6 100%)",text:"#1E2C38",timeColor:"#3A5870",card:"rgba(255,255,255,0.46)"},

  rain:        {bg:"linear-gradient(180deg,#344456 0%,#445464 45%,#546475 100%)",text:"#D0DDE8",timeColor:"#7898B8",card:"rgba(22,32,45,0.55)"},
  snow:        {bg:"linear-gradient(180deg,#8898A8 0%,#A8B8C8 42%,#C8D8E0 72%,#E0EAED 100%)",text:"#1E2E3A",timeColor:"#486078",card:"rgba(255,255,255,0.50)"},

};

function getThemeKey(code,hour){
  var night=hour<5||hour>=21,sunrise=hour>=5&&hour<8,sunset=hour>=18&&hour<21,deep=hour>=23||hour<4;
  if(code===0||code===1){if(deep)return'deepNight';if(night)return'clearNight';if(sunrise)return'sunrise';if(sunset)return'sunset';return'clearDay';}
  if(code===2)return night?'cloudy':'partlyCloudy';
  if(code===3)return'cloudy';
  if(code===45||code===48)return'foggy';
  if(code===51||code===53||code===55)return'drizzle';
  if(code===61||code===63||code===65||code===80||code===81||code===82)return'rain';
  if(code===71||code===73||code===75||code===77)return'snow';
  if(code===95||code===96||code===99)return'storm';
  return night?'clearNight':'clearDay';
}

var currentKey='',animFrame=null,ltTimer=null;
function applyTheme(key){
  var t=THEMES[key]||THEMES.clearDay;
  document.getElementById('bg-wrap').style.background=t.bg;
  document.getElementById('dash').style.color=t.text;
  document.getElementById('time-ampm').style.color=t.timeColor;
  document.getElementById('time-digital').style.color=t.timeColor;
  document.querySelectorAll('.card').forEach(function(c){c.style.background=t.card;});
  if(key===currentKey)return;
  currentKey=key;
  buildScene(key);
  startParticles(key);
}

function buildScene(key){
  var sun=document.getElementById('sun'),moon=document.getElementById('moon');
  var cw=document.getElementById('clouds-wrap'),fw=document.getElementById('fog-wrap');
  var rays=document.getElementById('sun-rays');

  // 태양 광선 (더 많고 다양하게)
  if(!rays.dataset.built){
    rays.dataset.built='1';
    for(var i=0;i<16;i++){
      var ray=document.createElement('div');
      ray.className='ray';
      var len=28+(i%4)*14,total=48+len,w=i%3===0?3:2;
      ray.style.cssText='height:'+total+'px;width:'+w+'px;left:'+(48-w/2)+'px;top:'+(48-total)+'px;transform-origin:50% 100%;transform:rotate('+(i*22.5)+'deg);opacity:'+(i%2===0?.9:.6)+';';
      rays.appendChild(ray);
    }
  }

  sun.style.display=(key==='clearDay'||key==='sunrise'||key==='partlyCloudy')?'block':'none';
  moon.style.display=(key==='clearNight'||key==='deepNight')?'block':'none';

  // 구름
  cw.innerHTML='';
  var cloudKeys=['partlyCloudy','cloudy','drizzle','rain','storm','sunset','foggy'];
  if(cloudKeys.indexOf(key)>=0){
    var cnt=key==='cloudy'?7:key==='rain'||key==='storm'?8:key==='foggy'?5:3;
    var dark=key==='rain'||key==='storm'||key==='drizzle';
    var foggy=key==='foggy';
    for(var i=0;i<cnt;i++){
      var cl=document.createElement('div');
      cl.className='cloud';
      var w=140+Math.random()*220,h=w*(0.28+Math.random()*0.16);
      var top=foggy?(60+Math.random()*280):(10+Math.random()*180);
      var dur=foggy?(80+Math.random()*80):(38+Math.random()*52);
      var delay=-Math.random()*dur;
      var opacity=foggy?(0.35+Math.random()*0.25):dark?(0.7+Math.random()*0.2):(0.62+Math.random()*0.22);
      var blur=foggy?(8+Math.random()*14):dark?0:(Math.random()*3);
      var color=dark?('rgba(28,36,50,'+opacity+')')
               :foggy?('rgba(180,190,200,'+opacity+')')
               :('rgba(255,255,255,'+opacity+')');
      cl.style.cssText='width:'+w+'px;height:'+h+'px;top:'+top+'px;background:'+color
        +';animation-duration:'+dur+'s;animation-delay:'+delay+'s'
        +';filter:blur('+blur+'px);border-radius:60px;';
      // 입체감 - 퍼프 3개
      var p1w=h*1.7,p1h=h*1.7,p2w=h*1.3,p2h=h*1.3,p3w=h*1.1,p3h=h*1.1;
      cl.innerHTML=
        '<div style="position:absolute;width:'+p1w+'px;height:'+p1h+'px;background:'+color
        +';border-radius:50%;top:-'+(p1h*.52)+'px;left:'+(w*.14)+'px;"></div>'
        +'<div style="position:absolute;width:'+p2w+'px;height:'+p2h+'px;background:'+color
        +';border-radius:50%;top:-'+(p2h*.42)+'px;left:'+(w*.38)+'px;"></div>'
        +'<div style="position:absolute;width:'+p3w+'px;height:'+p3h+'px;background:'+color
        +';border-radius:50%;top:-'+(p3h*.32)+'px;left:'+(w*.62)+'px;"></div>';
      cw.appendChild(cl);
    }
  }

  // 안개 레이어
  fw.innerHTML='';
  if(key==='foggy'){
    for(var i=0;i<5;i++){
      var fb=document.createElement('div');
      fb.className='fog-band';
      var ftop=80+i*110,fdur=90+i*30,fop=0.12+i*0.04;
      fb.style.cssText='top:'+ftop+'px;opacity:'+fop+';animation-duration:'+fdur+'s;animation-delay:-'+(i*18)+'s;background:linear-gradient(transparent,rgba(200,210,215,0.9),transparent);';
      fw.appendChild(fb);
    }
  }

  // 번개
  if(ltTimer){clearInterval(ltTimer);ltTimer=null;}
  if(key==='storm'){
    ltTimer=setInterval(function(){
      if(Math.random()<0.32){
        var el=document.getElementById('lightning');
        var x=20+Math.random()*60;
        el.style.background='radial-gradient(ellipse at '+x+'% 0%,rgba(210,230,255,0.55) 0%,rgba(200,220,255,0.18) 40%,transparent 70%)';
        setTimeout(function(){
          el.style.background='rgba(200,220,255,0)';
          if(Math.random()<0.45){
            setTimeout(function(){
              el.style.background='radial-gradient(ellipse at '+x+'% 0%,rgba(210,230,255,0.38) 0%,transparent 60%)';
              setTimeout(function(){el.style.background='rgba(200,220,255,0)';},60);
            },90);
          }
        },80);
      }
    },2800);
  }
}

function startParticles(key){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  var canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var W=canvas.width,H=canvas.height,pts=[],t=0;

  if(key==='rain'||key==='drizzle'||key==='storm'){
    // 빗방울 - 길이/속도/굵기 다양화, 튀김 효과
    var cnt=key==='drizzle'?90:key==='storm'?280:200;
    var angle=key==='storm'?0.22:0.12;
    for(var i=0;i<cnt;i++){
      var spd=key==='drizzle'?(2.5+Math.random()*3):(9+Math.random()*12);
      pts.push({x:Math.random()*W,y:Math.random()*H,
        spd:spd,len:(key==='drizzle'?6:14)+Math.random()*12,
        op:0.12+Math.random()*0.3,w:key==='drizzle'?0.8:0.6+Math.random()*0.8,
        angle:angle});
    }
    var splashes=[];
    (function loop(){
      ctx.clearRect(0,0,W,H);
      // 빗줄기
      pts.forEach(function(p){
        ctx.beginPath();
        ctx.lineWidth=p.w;
        ctx.globalAlpha=p.op;
        ctx.strokeStyle=key==='storm'?'rgba(190,215,255,1)':'rgba(175,210,255,1)';
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(p.x-p.len*p.angle,p.y-p.len);
        ctx.stroke();
        p.y+=p.spd; p.x+=p.spd*p.angle;
        if(p.y>H){
          // 튀김 파티클 생성
          if(Math.random()<0.18&&key!=='drizzle'){
            for(var s=0;s<3;s++) splashes.push({x:p.x,y:H-2,vx:(Math.random()-0.5)*3,vy:-(1+Math.random()*2.5),life:1});
          }
          p.y=-20; p.x=Math.random()*W;
        }
      });
      // 튀김
      ctx.strokeStyle='rgba(200,230,255,0.55)';
      splashes=splashes.filter(function(s){
        ctx.globalAlpha=s.life*0.5;
        ctx.lineWidth=0.8;
        ctx.beginPath();ctx.moveTo(s.x,s.y);
        s.x+=s.vx;s.y+=s.vy;s.vy+=0.18;s.life-=0.06;
        ctx.lineTo(s.x,s.y);ctx.stroke();
        return s.life>0;
      });
      ctx.globalAlpha=1;
      animFrame=requestAnimationFrame(loop);
    })();

  }else if(key==='snow'){
    // 눈송이 - 크기/흔들림 다양화
    for(var i=0;i<160;i++){
      var r=0.8+Math.random()*3.5;
      pts.push({x:Math.random()*W,y:Math.random()*H,r:r,
        spd:0.3+r*0.35,dr:(Math.random()-.5)*0.3,
        op:0.4+Math.random()*0.55,a:Math.random()*Math.PI*2,
        wa:0.008+Math.random()*0.018,wamp:0.4+Math.random()*1.2});
    }
    (function loop(){
      ctx.clearRect(0,0,W,H);
      pts.forEach(function(p){
        // 눈송이 글로우
        var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.2);
        g.addColorStop(0,'rgba(255,255,255,'+p.op+')');
        g.addColorStop(1,'rgba(255,255,255,0)');
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*2.2,0,Math.PI*2);
        ctx.fillStyle=g;ctx.fill();
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,'+(p.op*1.1)+')';ctx.fill();
        p.y+=p.spd; p.a+=p.wa; p.x+=Math.sin(p.a)*p.wamp;
        if(p.y>H+8){p.y=-8;p.x=Math.random()*W;}
      });
      animFrame=requestAnimationFrame(loop);
    })();

  }else if(key==='clearNight'||key==='deepNight'){
    // 별 - 크기별 분류, 유성 가끔
    for(var i=0;i<130;i++){
      pts.push({x:Math.random()*W,y:Math.random()*H*0.75,
        r:0.3+Math.random()*1.8,base:0.2+Math.random()*0.8,
        spd:0.006+Math.random()*0.022,off:Math.random()*Math.PI*2,type:'star'});
    }
    // 유성
    var meteor=null,meteorTimer=0;
    (function loop(){
      ctx.clearRect(0,0,W,H);
      t+=0.016;
      // 별
      pts.forEach(function(p){
        var op=p.base*(0.45+0.55*Math.sin(t*p.spd*60+p.off));
        var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.5);
        g.addColorStop(0,'rgba(255,252,220,'+op+')');
        g.addColorStop(1,'rgba(255,252,220,0)');
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
        ctx.fillStyle=g;ctx.fill();
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,240,'+op+')';ctx.fill();
      });
      // 유성
      meteorTimer++;
      if(!meteor&&meteorTimer>380&&Math.random()<0.018){
        meteor={x:Math.random()*W*0.6,y:Math.random()*H*0.3,vx:8+Math.random()*6,vy:4+Math.random()*4,life:1};
        meteorTimer=0;
      }
      if(meteor){
        var grad=ctx.createLinearGradient(meteor.x,meteor.y,meteor.x-meteor.vx*8,meteor.y-meteor.vy*8);
        grad.addColorStop(0,'rgba(255,255,220,'+(meteor.life*0.9)+')');
        grad.addColorStop(1,'rgba(255,255,220,0)');
        ctx.beginPath();ctx.moveTo(meteor.x,meteor.y);
        ctx.lineTo(meteor.x-meteor.vx*8,meteor.y-meteor.vy*8);
        ctx.strokeStyle=grad;ctx.lineWidth=1.5;
        ctx.globalAlpha=meteor.life;ctx.stroke();ctx.globalAlpha=1;
        meteor.x+=meteor.vx;meteor.y+=meteor.vy;meteor.life-=0.035;
        if(meteor.life<=0||meteor.x>W||meteor.y>H) meteor=null;
      }
      animFrame=requestAnimationFrame(loop);
    })();

  }else if(key==='sunrise'||key==='sunset'){
    // 노을 빛 입자
    for(var i=0;i<55;i++){
      pts.push({x:Math.random()*W,y:H*0.3+Math.random()*H*0.5,
        r:1+Math.random()*3,op:0.08+Math.random()*0.18,
        vx:(Math.random()-.5)*0.3,vy:-(0.1+Math.random()*0.25),
        life:Math.random(),decay:0.002+Math.random()*0.003,
        hue:key==='sunrise'?(30+Math.random()*40):(10+Math.random()*30)});
    }
    (function loop(){
      ctx.clearRect(0,0,W,H);
      pts.forEach(function(p){
        var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3);
        g.addColorStop(0,'hsla('+p.hue+',90%,75%,'+p.op*p.life+')');
        g.addColorStop(1,'hsla('+p.hue+',80%,65%,0)');
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*3,0,Math.PI*2);
        ctx.fillStyle=g;ctx.fill();
        p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
        if(p.life<=0){
          p.x=Math.random()*W;p.y=H*0.3+Math.random()*H*0.5;
          p.life=0.6+Math.random()*0.4;
        }
      });
      animFrame=requestAnimationFrame(loop);
    })();

  }else if(key==='clearDay'){
    // 맑은 날 - 빛 먼지 입자
    for(var i=0;i<40;i++){
      pts.push({x:Math.random()*W,y:Math.random()*H*0.6,
        r:0.6+Math.random()*1.4,op:0.06+Math.random()*0.1,
        vx:(Math.random()-.5)*0.18,vy:-(0.05+Math.random()*0.12),
        life:Math.random(),decay:0.0015+Math.random()*0.002});
    }
    (function loop(){
      ctx.clearRect(0,0,W,H);
      pts.forEach(function(p){
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,250,220,'+(p.op*p.life)+')';ctx.fill();
        p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
        if(p.life<=0){p.x=Math.random()*W;p.y=Math.random()*H*0.6;p.life=0.7+Math.random()*0.3;}
      });
      animFrame=requestAnimationFrame(loop);
    })();
  }
}

function to12h(ts){var h=parseInt(ts.slice(0,2)),m=ts.slice(3,5);return(h<12?'오전':'오후')+' '+(h%12||12)+':'+m;}
function facTime(t){if(!t)return'휴무';var p=t.split('~');return p.length===2?to12h(p[0])+' ~ '+to12h(p[1]):t;}

/* ── 위클리 캘린더 ── */
var currentEventDates=[];
function buildWeekly(){
  var now=new Date();
  var dow=now.getDay();
  var monday=new Date(now);
  monday.setDate(now.getDate()-((dow+6)%7));
  var row=document.getElementById('weekly-row');
  row.innerHTML='';
  for(var i=0;i<7;i++){
    var d=new Date(monday);
    d.setDate(monday.getDate()+i);
    var isToday=d.toDateString()===now.toDateString();
    var dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var hasEvent=currentEventDates.indexOf(dateStr)>=0;
    var holiday=HOLIDAYS_2026[dateStr]||'';
    var isSat=d.getDay()===6;
    var isSun=d.getDay()===0;
    var isRed=isSun||!!holiday;
    var dayNameColor=isRed?'color:rgba(255,90,90,0.95);':isSat?'color:rgba(80,170,255,0.95);':'';
    var bottom='';
    if(hasEvent) bottom='<span class="week-dot" style="background:#FFD700;opacity:1;"></span>';
    else if(holiday) bottom='<span style="font-size:8px;opacity:.75;'+(isRed?'color:rgba(255,100,100,.9)':'')+';line-height:1;display:block;text-align:center;white-space:nowrap;overflow:hidden;max-width:100%;">'+holiday+'</span>';
    else bottom='<span class="week-dot"></span>';
    var div=document.createElement('div');
    div.className='week-day'+(isToday?' today':'');
    div.innerHTML=
      '<span class="week-day-name" style="'+dayNameColor+'">'+DAYS_SHORT[d.getDay()]+'</span>'+
      '<span class="week-date">'+(d.getMonth()+1)+'/'+d.getDate()+'</span>'+
      bottom;
    row.appendChild(div);
  }
}

function renderEvents(events){
  var list=document.getElementById('events-list');
  var now=new Date(),todayMid=new Date(now.getFullYear(),now.getMonth(),now.getDate()),todayStr=now.toISOString().slice(0,10);
  currentEventDates=events.map(function(e){return e.date;});
  buildWeekly();
  var sorted=events.filter(function(e){return e.date>=todayStr;}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);}).slice(0,4);
  if(!sorted.length){list.innerHTML='<div style="opacity:.4;font-size:17px;padding:6px 0;">다가오는 일정이 없어요 😊</div>';return;}
  list.innerHTML=sorted.map(function(ev){
    var evDate=new Date(ev.date+'T'+ev.time);
    var diff=Math.round((new Date(evDate.getFullYear(),evDate.getMonth(),evDate.getDate())-todayMid)/86400000);
    var dt=diff===0?'D-day':'D-'+diff;
    var dc=diff===0?'dday-today':diff===1?'dday-soon':'dday-later';
    var mo=parseInt(ev.date.slice(5,7)),d=parseInt(ev.date.slice(8,10));
    var bc=ev.type==='repeat'?'rgba(121,134,203,0.28)':'rgba(100,180,120,0.22)';
    var bt=ev.type==='repeat'?'🔁 '+ev.note:'1회';
    var extra=ev.contact||ev.memo||'';
    var evData=encodeURIComponent(JSON.stringify({
      dt:dt,dc:dc,title:ev.title,
      date:mo+'월 '+d+'일('+DAYS_SHORT[evDate.getDay()]+')',
      time:to12h(ev.time),contact:ev.contact||'',memo:ev.memo||'',
      bt:bt,bc:bc
    }));
    return '<div class="event-item" onclick="openEventPopup(\''+evData+'\')">'
      +'<div class="event-dday '+dc+'">'+dt+'</div>'
      +'<span class="event-date-txt">'+mo+'월 '+d+'일('+DAYS_SHORT[evDate.getDay()]+')</span>'
      +'<span class="event-time-txt">'+to12h(ev.time)+'</span>'
      +'<span class="event-title">'+ev.title+'</span>'
      +'<span class="event-extra">'+extra+'</span>'
      +'<span class="event-badge" style="background:'+bc+';">'+bt+'</span>'
      +'</div>';
  }).join('');
}

/* ── 날씨 ── */
function makeComments(cur,high,low,maxP,aftP){
  var lines=[],diff=high-low,h=new Date().getHours();
  if(maxP>=70)lines.push('☂️ 우산 꼭 챙겨요!');
  else if(aftP>=50)lines.push('🌂 오후에 우산 챙겨요');
  else if(maxP>=30)lines.push('🌦 우산 챙겨두면 좋아요');
  else lines.push('☀️ 우산 없이 괜찮아요');
  if(diff>=10)lines.push('🧥 일교차 '+Math.round(diff)+'도! 겉옷 챙겨요');
  else if(diff>=7)lines.push('🌡 저녁엔 쌀쌀할 수 있어요');
  if(cur<=2)lines.push('🥶 많이 추워요. 따뜻하게 입어요');
  else if(cur<=8)lines.push('🧤 쌀쌀해요. 손 챙겨요');
  else if(cur>=28)lines.push('🥵 많이 더워요. 물 자주 마셔요');
  else if(cur>=23)lines.push('😊 오늘 날씨 따뜻해요');
  if(h>=5&&h<9)lines.push('🍳 아침 챙겨 먹었어요?');
  else if(h>=18&&h<21)lines.push('🌙 오늘도 수고했어요');
  return lines.slice(0,3);
}

function loadWeather(){
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+FIXED_LAT+'&longitude='+FIXED_LON+'&current=temperature_2m,apparent_temperature,weather_code&hourly=precipitation_probability&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul&forecast_days=1')
    .then(function(r){return r.json();})
    .then(function(data){
      var cur=Math.round(data.current.temperature_2m),feels=Math.round(data.current.apparent_temperature),code=data.current.weather_code;
      var high=Math.round(data.daily.temperature_2m_max[0]),low=Math.round(data.daily.temperature_2m_min[0]);
      var probs=(data.hourly&&data.hourly.precipitation_probability)||[];
      var maxP=Math.max.apply(null,probs.slice(0,24)),aftP=Math.max.apply(null,probs.slice(12,18));
      var icons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',53:'🌦️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',80:'🌦️',95:'⛈️'};
      var descs={0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',51:'이슬비',53:'이슬비',61:'비',63:'비',65:'강한 비',71:'눈',80:'소나기',95:'뇌우'};
      document.getElementById('weather-icon').textContent=icons[code]||'🌡️';
      document.getElementById('weather-temp').textContent=cur+'°';
      document.getElementById('weather-desc').textContent=descs[code]||'';
      document.getElementById('weather-high').textContent=high+'°';
      document.getElementById('weather-low').textContent=low+'°';
      document.getElementById('weather-feels').textContent='체감 '+feels+'°';
      document.getElementById('weather-comments').innerHTML=makeComments(cur,high,low,maxP,aftP).map(function(c){return'<span class="wcl">'+c+'</span>';}).join('');
      var key=getThemeKey(code,new Date().getHours());
      applyTheme(key);
      document.getElementById('theme-icon').textContent=icons[code]||'🌡️';
    }).catch(function(){
      function fixHeight(){document.getElementById('dash').style.height=window.innerHeight+'px';}
      fixHeight();
      window.addEventListener('resize',fixHeight);
      window.addEventListener('orientationchange',function(){setTimeout(fixHeight,300);});
      applyTheme(getThemeKey(0,new Date().getHours()));
    });
}

/* ── 알림 ── */
var notifiedEvents={},currentEvents=[];
function playChime(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var melody=[[523,0.00,0.45,0.18],[659,0.38,0.35,0.18],[784,0.68,0.35,0.18],[1047,0.96,0.65,0.20],[1319,1.54,0.32,0.16],[1047,1.80,0.32,0.18],[880,2.06,0.42,0.18],[784,2.44,0.55,0.18],[659,2.92,0.30,0.16],[784,3.16,0.30,0.18],[880,3.40,0.32,0.18],[1047,3.65,0.72,0.20],[880,4.30,0.30,0.16],[784,4.55,0.38,0.16],[659,4.87,0.32,0.16],[523,5.12,1.00,0.18]];
    melody.forEach(function(n){var osc=ac.createOscillator(),g=ac.createGain();osc.connect(g);g.connect(ac.destination);osc.frequency.value=n[0];osc.type='sine';var t=ac.currentTime+n[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(n[3],t+0.05);g.gain.setValueAtTime(n[3],t+n[2]*.55);g.gain.exponentialRampToValueAtTime(0.001,t+n[2]+0.25);osc.start(t);osc.stop(t+n[2]+0.3);var o2=ac.createOscillator(),g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);o2.frequency.value=n[0]*2;o2.type='triangle';g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(n[3]*0.07,t+0.04);g2.gain.exponentialRampToValueAtTime(0.001,t+n[2]*.45);o2.start(t);o2.stop(t+n[2]*.5);});
  }catch(e){}
}
function closeAlert(){document.getElementById('alert-popup').style.display='none';}
function checkAlerts(){
  var now=new Date(),todayStr=now.toISOString().slice(0,10);
  currentEvents.forEach(function(ev){
    if(ev.date<todayStr)return;
    var evTime=new Date(ev.date+'T'+ev.time),diffMin=(evTime-now)/60000;
    var k30=ev.date+ev.time+'_30',k10=ev.date+ev.time+'_10';
    var trigKey=null,minsLeft=0;
    if(diffMin>0&&diffMin<=30&&diffMin>29&&!notifiedEvents[k30]){trigKey=k30;minsLeft=30;}
    else if(diffMin>0&&diffMin<=10&&diffMin>9&&!notifiedEvents[k10]){trigKey=k10;minsLeft=10;}
    if(trigKey){
      notifiedEvents[trigKey]=true;
      document.getElementById('al-countdown').textContent=minsLeft+'분 후';
      document.getElementById('al-time-text').textContent=to12h(ev.time);
      document.getElementById('al-event-title').textContent=ev.title;
      var popup=document.getElementById('alert-popup');
      popup.style.display='block';popup.style.animation='none';popup.offsetHeight;popup.style.animation='slideUp .4s cubic-bezier(.34,1.56,.64,1)';
      playChime();
      setTimeout(closeAlert,15000);
    }
  });
}

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby51XRgSsdzXVP77cJnQB9BDeL9izmsfGIgW2Tn7i4UF1YPJb4gYEO1QQYOWFAagdD1PQ/exec";
function getCategory(action){
  if(action === '굿모닝' || action === '굿나잇') return '기상';
  if(action === '필요시' || action === '불면시') return '기상';
  if(action === '아침약' || action === '저녁약') return '약';
  return '';
}

function getActionEmoji(action){
  if(action === '굿모닝') return '☀️';
  if(action === '굿나잇') return '🌛';
  if(action === '필요시') return '⚡';
  if(action === '불면시') return '🌙';
  if(action === '아침약' || action === '저녁약') return '💊';
  return '✨';
}

function showToast(message){
  var toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(function(){
    toast.classList.remove('show');
  }, 1600);
}

function burstCelebration(action){
  var layer = document.getElementById('celebration-layer');
  var pool = ['💖','💕','✨','🌟'];
  if(action === '굿모닝') pool = ['☀️','🌼','✨','💛'];
  if(action === '굿나잇') pool = ['🌛','💤','⭐','💜'];
  if(action === '필요시') pool = ['⚡','🌼','✨','💛'];
  if(action === '불면시') pool = ['🌙','💤','⭐','💙'];
  if(action === '아침약' || action === '저녁약') pool = ['💊','✨','💖','🌈'];
  for(var i=0; i<18; i++){
    var el = document.createElement('div');
    el.className = 'celebrate-item';
    el.textContent = pool[Math.floor(Math.random() * pool.length)];
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.animationDelay = (Math.random() * 0.25) + 's';
    el.style.fontSize = (22 + Math.random() * 16) + 'px';
    layer.appendChild(el);
    setTimeout((function(node){return function(){ node.remove(); };})(el), 2200);
  }
}

function burstConfetti(action){
  var layer = document.getElementById('celebration-layer');
  var pool = ['💖','✨','🌟','💕'];
  if(action === '굿모닝') pool = ['☀️','🌼','✨','💛'];
  if(action === '굿나잇') pool = ['🌛','⭐','💤','💜'];
  if(action === '필요시') pool = ['⚡','🌼','✨','💛'];
  if(action === '불면시') pool = ['🌙','⭐','💤','💙'];
  if(action === '아침약' || action === '저녁약') pool = ['💊','✨','💖','🌈'];
  var centerX = window.innerWidth / 2;
  var baseY = window.innerHeight - 40;
  for(var i=0; i<18; i++){
    var el = document.createElement('div');
    el.className = 'confetti-item';
    el.textContent = pool[Math.floor(Math.random() * pool.length)];
    var angle = (Math.random() - 0.5) * Math.PI;
    var distance = 120 + Math.random() * 180;
    var dx = Math.cos(angle) * distance;
    var dy = -Math.abs(Math.sin(angle) * distance);
    el.style.left = centerX + 'px';
    el.style.top = baseY + 'px';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    layer.appendChild(el);
    setTimeout((function(node){return function(){ node.remove(); };})(el), 1500);
  }
}

function playSuccessMagic(){
  try{
    var ac = new (window.AudioContext || window.webkitAudioContext)();
    var now = ac.currentTime;
    var notes = [[880,0.00,0.25],[1047,0.08,0.28],[1319,0.16,0.32],[1568,0.28,0.38],[2093,0.45,0.55]];
    notes.forEach(function(n){
      var freq=n[0],start=now+n[1],dur=n[2];
      var osc=ac.createOscillator(),gain=ac.createGain();
      osc.connect(gain);gain.connect(ac.destination);
      osc.type='triangle';osc.frequency.setValueAtTime(freq,start);
      gain.gain.setValueAtTime(0.0001,start);gain.gain.exponentialRampToValueAtTime(0.05,start+0.03);gain.gain.exponentialRampToValueAtTime(0.0001,start+dur);
      osc.start(start);osc.stop(start+dur+0.02);
    });
    var sparkle=[2093,2637,3136,4186];
    sparkle.forEach(function(freq,i){
      var osc=ac.createOscillator(),gain=ac.createGain();
      var t=now+0.2+i*0.08;
      osc.connect(gain);gain.connect(ac.destination);
      osc.type='sine';osc.frequency.setValueAtTime(freq,t);
      gain.gain.setValueAtTime(0.0001,t);gain.gain.exponentialRampToValueAtTime(0.02,t+0.02);gain.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
      osc.start(t);osc.stop(t+0.3);
    });
  }catch(e){console.error(e);}
}

function popEmojiFromButton(button, emoji){
  var rect = button.getBoundingClientRect();
  var pop = document.createElement('div');

  pop.textContent = emoji;
  pop.style.left = (rect.left + rect.width / 2) + 'px';
  pop.style.top = (rect.top + 14) + 'px';
  document.getElementById('emoji-pop-layer').appendChild(pop);
  setTimeout(function(){ pop.remove(); }, 950);
}

function resetButtonVisual(button){
  if(!button) return;
  button.classList.remove('saving');
  button.classList.remove('done');
  if(button._resetTimer){
    clearTimeout(button._resetTimer);
    button._resetTimer = null;
  }
}

function flashButtonDone(button){
  if(!button) return;
  if(button._resetTimer){ clearTimeout(button._resetTimer); }
  button.classList.remove('done');
  void button.offsetWidth;
  button.classList.add('done');
  button._resetTimer = setTimeout(function(){
    button.classList.remove('saving');
    button.classList.remove('done');
    button._resetTimer = null;
  }, 1400);
}

function logAction(action, clickedButton) {
  var category = getCategory(action);
  clickedButton.classList.add('saving');
  popEmojiFromButton(clickedButton, getActionEmoji(action));
  if(Math.random() < 0.5){ burstCelebration(action); }else{ burstConfetti(action); }
  playSuccessMagic();
  showToast(action + " 기록 완료!");
  fetch(SCRIPT_URL, {
    method: "POST",
    headers: {"Content-Type": "text/plain;charset=utf-8"},
    body: JSON.stringify({category: category, action: action, note: ""})
  })
  .then(function(res){ return res.text(); })
  .then(function(){ flashButtonDone(clickedButton); })
  .catch(function(err){
    resetButtonVisual(clickedButton);
    showToast("기록 실패: " + err.message);
    console.error(err);
  });
}
